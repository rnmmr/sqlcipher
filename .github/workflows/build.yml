name: Build sqlcipher_ntqq

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with all tools
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-tcl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkg-config

      - name: Build mksourceid & generate sqlite3.h
        run: |
          gcc -o mksourceid tool/mksourceid.c
          tclsh tool/mksqlite3h.tcl . > sqlite3.h

      - name: Build lemon & generate parse tables
        run: |
          gcc -o lemon.exe tool/lemon.c -Itool
          cp src/parse.y .
          ./lemon.exe -Ttool/lempar.c parse.y

      - name: Generate opcodes
        run: |
          cat parse.h src/vdbe.c | tclsh tool/mkopcodeh.tcl > opcodes.h
          tclsh tool/mkopcodec.tcl opcodes.h > opcodes.c

      - name: Generate keywordhash
        run: |
          gcc -o mkkeywordhash.exe tool/mkkeywordhash.c -Isrc
          ./mkkeywordhash.exe > keywordhash.h

      - name: Generate config header
        run: |
          cat > sqlite_cfg.h << 'EOF'
          #ifndef SQLITE_CFG_H
          #define SQLITE_CFG_H
          #define HAVE_USLEEP 1
          #endif
          EOF

      - name: Generate sqlite3.c amalgamation
        run: |
          mkdir -p tsrc
          cp src/* tsrc/
          for d in ext/fts3 ext/icu ext/rtree ext/session ext/rbu ext/misc ext/userauth; do
            [ -d "$d" ] && cp "$d"/*.c "$d"/*.h tsrc/ 2>/dev/null || true
          done
          # Empty fts5.c (FTS5 disabled via -DSQLITE_OMIT_FTS5)
          touch tsrc/fts5.c
          cp parse.c parse.h opcodes.c opcodes.h keywordhash.h sqlite_cfg.h sqlite3.h tsrc/
          cp src/crypto.h src/sqlcipher.h tsrc/
          rm -f tsrc/sqlite.h.in tsrc/parse.y tsrc/shell.c.in tsrc/tclsqlite.c tsrc/test*.c
          cat tsrc/vdbe.c | tclsh tool/vdbe-compress.tcl > vdbe.new && mv vdbe.new tsrc/vdbe.c
          tclsh tool/mksqlite3c.tcl --linemacros=0

      - name: Compile sqlcipher_ntqq.exe
        run: |
          gcc -o sqlcipher_ntqq.exe sqlite3.c main.c \
            -I. -Isrc -Iext/fts3 -Iext/rtree -Iext/icu -Iext/session \
            -I/mingw64/include -L/mingw64/lib \
            -DSQLITE_HAS_CODEC -DSQLITE_THREADSAFE=0 -DSQLITE_SOUNDEX \
            -DSQLITE_OMIT_FTS5 -DSQLITE_PRIVATE= \
            -municode -lcrypto -static-libgcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher_ntqq-x64-windows
          path: sqlcipher_ntqq.exe
